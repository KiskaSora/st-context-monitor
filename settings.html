<div class="context-monitor-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Context Monitor</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container">
                <input id="context_monitor_enabled" type="checkbox" />
                <label for="context_monitor_enabled">Enable Monitor</label>
            </div>
            
            <hr>
            
            <div class="flex-container">
                <label for="context_monitor_position">Position:</label>
                <select id="context_monitor_position" class="text_pole">
                    <option value="top-right">Top Right</option>
                    <option value="top-left">Top Left</option>
                    <option value="bottom-right">Bottom Right</option>
                    <option value="bottom-left">Bottom Left</option>
                </select>
            </div>

            <div class="flex-container">
                <label for="context_monitor_opacity">Opacity:</label>
                <input id="context_monitor_opacity" type="range" min="0.1" max="1" step="0.1" />
                <span id="opacity_value">100%</span>
            </div>

            <div class="flex-container">
                <label for="context_monitor_scale">Scale:</label>
                <input id="context_monitor_scale" type="range" min="0.5" max="1.5" step="0.1" />
                <span id="scale_value">1.0x</span>
            </div>
            
            <div class="flex-container">
                <label for="context_monitor_bg_color">Background:</label>
                <input id="context_monitor_bg_color" type="color" class="text_pole" style="width: 50px; height: 30px; padding: 0;" />
            </div>

            <hr>

            <div class="flex-container">
                <input id="context_monitor_use_custom_max" type="checkbox" />
                <label for="context_monitor_use_custom_max">Use custom max context</label>
            </div>

            <div class="flex-container" id="custom_max_container">
                <label for="context_monitor_custom_max">Custom Max:</label>
                <input id="context_monitor_custom_max" type="number" class="text_pole" min="1000" max="1000000" step="1000" placeholder="e.g. 32000" style="width: 120px;" />
            </div>

            <p><small>Shows the actual size of the Chat Completion prompt (with system and other stuff).</small></p>
        </div>
    </div>
</div>
